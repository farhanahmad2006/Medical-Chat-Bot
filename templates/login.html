{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 70vh;">
    <div class="col-md-5 col-lg-4">
        <div class="card glass-card p-4">
            <div class="card-body">
                <div class="text-center mb-4">
                    <h2 class="fw-bold text-primary">Welcome Back</h2>
                    <p class="text-muted">Login to access your health dashboard</p>
                </div>

                {% if error %}
                <div class="alert alert-danger py-2 text-center" role="alert">
                    {{ error }}
                </div>
                {% endif %}

                <form action="/login" method="POST">
                    <div class="mb-3">
                        <label for="username" class="form-label text-muted small">Username</label>
                        <div class="input-group">
                            <span class="input-group-text bg-white border-end-0"><i
                                    class="fas fa-user text-primary"></i></span>
                            <input type="text" class="form-control border-start-0 ps-0" id="username" name="username"
                                required>
                        </div>
                    </div>
                    <div class="mb-4">
                        <label for="password" class="form-label text-muted small">Password</label>
                        <div class="input-group">
                            <span class="input-group-text bg-white border-end-0"><i
                                    class="fas fa-lock text-primary"></i></span>
                            <input type="password" class="form-control border-start-0 ps-0" id="password"
                                name="password" required>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-premium w-100 py-2 rounded-pill fw-bold">Login</button>
                </form>
                <div class="text-center mt-4">
                    <span class="text-muted small">Don't have an account? </span>
                    <a href="/register" class="text-primary text-decoration-none fw-bold small">Sign Up</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
