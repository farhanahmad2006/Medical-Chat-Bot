{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
        <div class="card glass-card p-4">
            <div class="card-body">
                <div class="text-center mb-4">
                    <h2 class="fw-bold text-primary">Create Account</h2>
                    <p class="text-muted">Join MediBot for personalized health insights</p>
                </div>

                {% if error %}
                <div class="alert alert-danger py-2 text-center" role="alert">
                    {{ error }}
                </div>
                {% endif %}

                <form action="/register" method="POST">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label text-muted small">Username</label>
                            <input type="text" class="form-control" name="username" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label text-muted small">Email Address</label>
                            <input type="email" class="form-control" name="email" required>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label text-muted small">Password</label>
                        <input type="password" class="form-control" name="password" required>
                    </div>

                    <div class="row">
                        <div class="col-md-4 mb-3">
                            <label class="form-label text-muted small">Age</label>
                            <input type="number" class="form-control" name="age">
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label text-muted small">Gender</label>
                            <select class="form-select" name="gender">
                                <option value="">Select...</option>
                                <option value="Male">Male</option>
                                <option value="Female">Female</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label text-muted small">Location</label>
                            <input type="text" class="form-control" name="location">
                        </div>
                    </div>

                    <div class="form-check mb-4">
                        <input class="form-check-input" type="checkbox" required id="terms">
                        <label class="form-check-label small text-muted" for="terms">
                            I agree to the Terms of Service and Privacy Policy
                        </label>
                    </div>

                    <button type="submit" class="btn btn-premium w-100 py-2 rounded-pill fw-bold">Create
                        Account</button>
                </form>
                <div class="text-center mt-3">
                    <span class="text-muted small">Already have an account? </span>
                    <a href="/login" class="text-primary text-decoration-none fw-bold small">Login</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
